<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Controle de Estudos</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #1f2937;
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            width: 80%;
            margin: 40px auto;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
        }

        a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }

        .button {
            display: inline-block;
            background-color: #2563eb;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<header>
    <h1>Sistema de Controle de Estudos</h1>
    <p>Aplicação web desenvolvida com Python e Flask</p>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
