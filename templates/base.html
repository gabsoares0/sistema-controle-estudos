<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Controle de Estudos</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #1f2937;
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            width: 80%;
            margin: 40px auto;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
        }

        a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }

        .button {
            display: inline-block;
            background-color: #2563eb;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            margin-top: 15px;
        }

                form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input, textarea, select {
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #d1d5db;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f3f4f6;
        }

        hr {
            margin: 30px 0;
        }

                .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background-color: #f9fafb;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .card h3 {
            font-size: 32px;
            margin: 0;
            color: #1f2937;
        }

        .card p {
            margin: 8px 0 0;
            color: #4b5563;
        }

            .danger {
            background-color: #dc2626;
        }

        .danger:hover {
            background-color: #b91c1c;
        }

        td form {
            margin: 0;
        }

            .secondary {
            background-color: #4b5563;
        }

        .secondary:hover {
            background-color: #374151;
        }

        .actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .actions form {
            margin: 0;
        }

        .actions .button {
            margin-top: 0;
        }
        
    </style>
</head>
<body>

<header>
    <h1>Sistema de Controle de Estudos</h1>
    <p>Aplicação web desenvolvida com Python e Flask</p>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
